<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>




<body>


    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="btnslist">
        <button class="diffbtn" id="operat">*</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="diffbtn" id="operat">/</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="diffbtn" id="operat">+</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="diffbtn" id="operat">-</button>
        <button>0</button>
        <button>.</button>
        <button class="diffbtn">C</button>
        <button class="diffbtn" id="operat">=</button>

            <script src="java.js"></script>

        </div>
    </div>
</body>
</html>
